<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Theater Ushers - Card Game</title>
  <style>
    /* Center the Phaser canvas in the browser window */
    body {
      margin: 0;
      padding: 0;
      background: #0a0a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <!--
    Phaser will create a <canvas> element and append it to the body.
    We don't need a container div — Phaser handles this automatically
    based on the 'parent' config option (defaults to document.body).
  -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
